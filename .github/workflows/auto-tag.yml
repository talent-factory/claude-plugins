name: Auto Tag Releases

on:
  push:
    branches:
      - main
    paths:
      - '.claude-plugin/marketplace.json'
      - 'plugins/**/.claude-plugin/plugin.json'

permissions:
  contents: write

jobs:
  create-tags:
    name: Create Version Tags
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Create marketplace tag
        run: |
          set -euo pipefail

          MARKETPLACE_VERSION=$(jq -r '.version // empty' .claude-plugin/marketplace.json)
          if [ -z "$MARKETPLACE_VERSION" ]; then
            echo "::error::marketplace.json is missing the 'version' field"
            exit 1
          fi
          if ! [[ "$MARKETPLACE_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Invalid marketplace version format: '$MARKETPLACE_VERSION'"
            exit 1
          fi

          TAG="v${MARKETPLACE_VERSION}"

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping"
          else
            git tag -a "$TAG" -m "Release Marketplace v${MARKETPLACE_VERSION}"
            echo "$TAG" >> "$RUNNER_TEMP/new-tags.txt"
            echo "Created tag: $TAG"
          fi

      - name: Create plugin tags
        run: |
          set -euo pipefail

          shopt -s nullglob
          plugin_files=(plugins/*/.claude-plugin/plugin.json)
          if [ ${#plugin_files[@]} -eq 0 ]; then
            echo "::error::No plugin.json files found"
            exit 1
          fi

          for plugin_json in "${plugin_files[@]}"; do
            PLUGIN_NAME=$(jq -r '.name // empty' "$plugin_json")
            PLUGIN_VERSION=$(jq -r '.version // empty' "$plugin_json")

            if [ -z "$PLUGIN_NAME" ] || [ -z "$PLUGIN_VERSION" ]; then
              echo "::error::Missing name or version in $plugin_json"
              exit 1
            fi
            if ! [[ "$PLUGIN_NAME" =~ ^[a-zA-Z0-9._-]+$ ]]; then
              echo "::error::Invalid plugin name '$PLUGIN_NAME' in $plugin_json"
              exit 1
            fi
            if ! [[ "$PLUGIN_VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version '$PLUGIN_VERSION' in $plugin_json"
              exit 1
            fi

            TAG="${PLUGIN_NAME}/v${PLUGIN_VERSION}"

            if git rev-parse "$TAG" >/dev/null 2>&1; then
              echo "Tag $TAG already exists, skipping"
            else
              git tag -a "$TAG" -m "Release ${PLUGIN_NAME} v${PLUGIN_VERSION}"
              echo "$TAG" >> "$RUNNER_TEMP/new-tags.txt"
              echo "Created tag: $TAG"
            fi
          done

      - name: Push new tags
        run: |
          set -euo pipefail

          if [ ! -f "$RUNNER_TEMP/new-tags.txt" ]; then
            echo "No new tags to push"
            exit 0
          fi

          echo "Pushing new tags:"
          cat "$RUNNER_TEMP/new-tags.txt"

          while IFS= read -r tag; do
            git push origin "refs/tags/$tag"
          done < "$RUNNER_TEMP/new-tags.txt"

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          if [ ! -f "$RUNNER_TEMP/new-tags.txt" ]; then
            echo "No new tags, no releases to create"
            exit 0
          fi

          while IFS= read -r tag; do
            if [[ "$tag" == v* ]]; then
              TITLE="Marketplace ${tag}"
            else
              PLUGIN="${tag%%/*}"
              VERSION="${tag#*/}"
              TITLE="${PLUGIN} ${VERSION}"
            fi

            echo "Creating release for $tag ($TITLE)"
            gh release create "$tag" \
              --title "$TITLE" \
              --generate-notes \
              --latest="$( [[ "$tag" == v* ]] && echo true || echo false )"
          done < "$RUNNER_TEMP/new-tags.txt"
